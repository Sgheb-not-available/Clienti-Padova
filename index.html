<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Mappa Clienti Padova</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60%;
      right: 0;
    }
    #lista {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 40%;
      overflow-y: auto;
      padding: 10px;
      background: #f0f0f0;
    }
    #lista ul {
      list-style: none;
      padding: 0;
    }
    #lista li {
      cursor: pointer;
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }
    #lista li:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="lista">
    <h3>Elenco clienti</h3>
    <ul id="company-list"></ul>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
